name: Build Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            install_cmd: |
              sudo apt-get update
              sudo apt-get install -y ninja-build autoconf autoconf-archive automake libtool pkg-config
          - os: macos-latest
            install_cmd: |
              brew install ninja autoconf autoconf-archive automake libtool pkg-config

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ${{ matrix.install_cmd }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 522253caf47268c1724f486a035e927a42a90092

      - name: Configure CMake
        run: cmake --preset release
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build
        run: cmake --build --preset release
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zapshare-${{ matrix.os }}
          path: build/release/bin/*
          if-no-files-found: error
