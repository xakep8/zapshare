syntax = "proto3";

package zapshare.v1;

enum ProtocolVersion {
  PROTOCOL_VERSION_UNSPECIFIED = 0;
  PROTOCOL_VERSION_1           = 1;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED            = 0;
  ERROR_CODE_INVALID_TOKEN          = 1;
  ERROR_CODE_HANDSHAKE_FAILED       = 2;
  ERROR_CODE_UNAUTHORIZED_PEER      = 3;
  ERROR_CODE_BAD_PACKET             = 4;
  ERROR_CODE_TRANSFER_NOT_FOUND     = 5;
  ERROR_CODE_OFFSET_MISMATCH        = 6;
  ERROR_CODE_INTEGRITY_CHECK_FAILED = 7;
}

message EndpointCandidate {
  string ip   = 1;
  uint32 port = 2;
}

message PeerIdentity {
  bytes long_term_public_key = 1;
  bytes ephemeral_public_key = 2;
}

message TransferMetadata {
  string                     transfer_id     = 1;
  string                     token           = 2;
  string                     file_name       = 3;
  uint64                     file_size       = 4;
  string                     file_hash       = 5;
  repeated EndpointCandidate endpoints       = 6;
  PeerIdentity               sender_identity = 7;
}
